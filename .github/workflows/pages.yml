name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  test:
    name: Unit and type checks (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install pinned development tools
        run: npm ci --ignore-scripts

      - name: Run test suite
        run: npm test

      # Checks the application plus dependency-neutral simulator modules via
      # JSDoc. Three.js-facing code remains covered by the browser jobs below.
      - name: Type-check application and simulator
        run: npm run typecheck

      - name: Verify the build on the minimum supported Node version
        if: matrix.node == '22'
        run: npm run build -- --output /tmp/barbelo-node22-build --version node22-ci

  simulator-e2e:
    name: Simulator E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # GitHub's GPU-less Ubuntu runner currently exposes no WebGL context to
        # Playwright Firefox 151, even with webgl.force-enabled. Keep Firefox
        # available in the local harness; CI renderer coverage runs in the two
        # engines that provide deterministic software WebGL here.
        browser: [chromium, webkit]
    env:
      PLAYWRIGHT_VERSION: 1.61.1
      PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install pinned development tools
        run: npm ci --ignore-scripts

      - name: Verify Playwright pin
        run: node -e "const actual=require('playwright/package.json').version; if (actual !== process.env.PLAYWRIGHT_VERSION) throw new Error('Expected Playwright ' + process.env.PLAYWRIGHT_VERSION + ', got ' + actual)"

      # Playwright 1.61.1 pins Chromium v1228 and WebKit v2311 for these legs.
      # Each matrix leg installs only its browser and matching Linux libraries.
      - name: Install pinned browser
        run: npx --no-install playwright install --with-deps "$PLAYWRIGHT_BROWSER"

      - name: Run loaded-application smoke test
        if: matrix.browser == 'chromium'
        run: node test/e2e/smoke.js

      - name: Run loaded-application accessibility test
        if: matrix.browser == 'chromium'
        run: node test/e2e/a11y.js

      - name: Run responsive capability browser test
        run: node test/e2e/simulator-responsive.js

      - name: Run sustained slow-frame offer test
        run: node test/e2e/simulator-performance.js

      - name: Run simulator browser test
        run: node test/e2e/simulator.js

      - name: Prepare built-site simulator harness
        run: |
          set -euo pipefail
          site_root=/tmp/bridge-simulator-built-e2e
          npm run build -- --output "$site_root" --version built-e2e

      - name: Run built-site simulator browser test
        env:
          SERVE_ROOT: /tmp/bridge-simulator-built-e2e
        run: node test/e2e/simulator-built.js

  build:
    runs-on: ubuntu-latest
    needs: [test, simulator-e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install pinned build tools
        run: npm ci --ignore-scripts

      - name: Prepare static site
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          npm run build -- --version "$short_sha"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
