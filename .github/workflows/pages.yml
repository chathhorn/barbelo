name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run test suite
        run: node --test

      # Type-checks the dependency-free analysis core and parsers via
      # JSDoc annotations (see src/core/types.js and jsconfig.json). The
      # UI layer is intentionally outside the checked include set.
      - name: Type-check core and parsers
        run: npx --yes -p typescript@5.9 tsc -p jsconfig.json --noEmit

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare static site
        run: |
          set -euo pipefail
          mkdir -p _site/assets
          cp index.html _site/index.html
          cp assets/*.css assets/*.png assets/*.jpg assets/*.svg _site/assets/
          npx --yes esbuild@0.25.5 src/main.js --bundle --format=iife --outfile=_site/assets/barbelo.js
          short_sha="${GITHUB_SHA::7}"
          sed -i "s/__BARBELO_VERSION__/${short_sha}/g" _site/index.html
          sed -i "s|<script type=\"module\" src=\"src/main.js?v=${short_sha}\"></script>|<script defer src=\"assets/barbelo.js?v=${short_sha}\"></script>|" _site/index.html
          grep -q "data-version=\"${short_sha}\"" _site/index.html
          grep -q "assets/barbelo.css?v=${short_sha}" _site/index.html
          grep -q "assets/barbelo.js?v=${short_sha}" _site/index.html
          if grep -q "src/main.js" _site/index.html; then
            echo "Module script tag survived static-site preparation." >&2
            exit 1
          fi
          test -s _site/assets/barbelo.js
          if grep -q "__BARBELO_VERSION__" _site/index.html; then
            echo "Version placeholder survived static-site preparation." >&2
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
